version: '3.8'

services:
  app:
    build: .
    container_name: fua-backend
    ports:
      - "3080:3080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:ifr9kfu5xlkizn6x@51.210.6.173:5431/fua}
      - TZ=Europe/Paris
      - ADMIN_API_KEY=${ADMIN_API_KEY:-fua-admin-secret-key-change-in-production}
    volumes:
      - ./data:/app/data
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3080/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

